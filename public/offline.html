<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — LaunchFive Studio</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #070A13;
        color: #F8FAFC;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 28rem;
        padding: 2.5rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .mark {
        width: 5rem; height: 5rem; margin: 0 auto 1.5rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #7C3AED, #06B6D4);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 1.5rem;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
      p { color: #94A3B8; line-height: 1.6; margin-bottom: 1.5rem; }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        background: linear-gradient(135deg, #7C3AED, #8B5CF6);
        color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">L5</div>
      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Check your connection
        and try again — your creative projects with LaunchFive Studio will be
        right here when you're back.
      </p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
